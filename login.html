<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - Flowy Todo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 48px;
        }

        .title {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            font-size: 14px;
            text-align: center;
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            background: #f5f7fa;
            border-radius: 12px;
            padding: 4px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.3s;
            font-weight: 500;
            color: #666;
        }

        .tab:hover {
            background: rgba(102, 126, 234, 0.1);
        }

        .tab.active {
            background: white;
            color: #667eea;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .error {
            color: #e53e3e3;
            font-size: 14px;
            margin-top: 10px;
            padding: 10px;
            background: #fee2e2;
            border-radius: 8px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .hint {
            margin-top: 20px;
            padding: 15px;
            background: #f0f9ff;
            border-radius: 10px;
            font-size: 13px;
            color: #0c4a6e;
        }

        .hint-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .feature-list {
            margin-top: 5px;
            padding-left: 20px;
        }

        .feature-list li {
            margin: 4px 0;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <div class="logo-icon">✨</div>
            <h1 class="title">Flowy Todo</h1>
            <p class="subtitle">让每一天都井井有条</p>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">登录</div>
            <div class="tab" onclick="switchTab('register')">注册</div>
        </div>

        <!-- 登录表单 -->
        <div id="login-form">
            <form onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="login-username" placeholder="请输入用户名" required autocomplete="username">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="login-password" placeholder="请输入密码" required autocomplete="current-password">
                </div>
                <button type="submit" class="btn btn-primary">登录</button>
                <div class="error" id="login-error"></div>
            </form>
        </div>

        <!-- 注册表单 -->
        <div id="register-form" style="display: none;">
            <form onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" id="register-username" placeholder="至少3个字符" required autocomplete="username" minlength="3">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" id="register-password" placeholder="至少6个字符" required autocomplete="new-password" minlength="6">
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" id="register-confirm" placeholder="再次输入密码" required autocomplete="new-password" minlength="6">
                </div>
                <button type="submit" class="btn btn-primary">注册</button>
                <div class="error" id="register-error"></div>
            </form>
        </div>

        <div class="hint">
            <div class="hint-title">✨ 多用户数据隔离</div>
            <ul class="feature-list">
                <li>✅ 每个用户独立的数据空间</li>
                <li>✅ 数据永久保存，不会丢失</li>
                <li>✅ 安全的密码加密存储</li>
                <li>✅ 支持 Chrome、Safari 等所有浏览器</li>
            </ul>
        </div>
    </div>

    <script>
        // 动态获取 API 基础路径
        const getApiBase = () => {
            const path = window.location.pathname;
            const basePath = path.substring(0, path.lastIndexOf('/') + 1);
            return basePath + 'api';
        };

        function switchTab(tab) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            document.getElementById('login-form').style.display = tab === 'login' ? 'block' : 'none';
            document.getElementById('register-form').style.display = tab === 'register' ? 'block' : 'none';
        }

        function showError(form, message) {
            const errorEl = document.getElementById(`${form}-error`);
            errorEl.textContent = message;
            errorEl.classList.add('show');
            setTimeout(() => errorEl.classList.remove('show'), 3000);
        }

        async function handleLogin(event) {
            event.preventDefault();

            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;
            const btn = event.target.querySelector('button');

            btn.disabled = true;
            btn.textContent = '登录中...';

            try {
                const response = await fetch(getApiBase() + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.success) {
                    // 保存 token 和用户名
                    console.log('登录成功，保存 token:', result.token);
                    localStorage.setItem('flowy-token', result.token);
                    localStorage.setItem('flowy-username', result.username);
                    console.log('Token 已保存，验证:', localStorage.getItem('flowy-token'));

                    // 短暂延迟确保 localStorage 写入完成
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 100);
                } else {
                    showError('login', result.error || '登录失败');
                }
            } catch (error) {
                showError('login', '网络错误，请稍后重试');
                console.error('登录错误:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = '登录';
            }
        }

        async function handleRegister(event) {
            event.preventDefault();

            const username = document.getElementById('register-username').value;
            const password = document.getElementById('register-password').value;
            const confirm = document.getElementById('register-confirm').value;
            const btn = event.target.querySelector('button');

            if (password !== confirm) {
                showError('register', '两次输入的密码不一致');
                return;
            }

            btn.disabled = true;
            btn.textContent = '注册中...';

            try {
                const response = await fetch(getApiBase() + '/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (result.success) {
                    // 注册成功，自动登录
                    showError('register', '注册成功！正在登录...');

                    setTimeout(async () => {
                        const loginResult = await fetch(getApiBase() + '/auth/login', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ username, password })
                        });

                        const loginData = await loginResult.json();
                        if (loginData.success) {
                            console.log('注册成功并登录，保存 token:', loginData.token);
                            localStorage.setItem('flowy-token', loginData.token);
                            localStorage.setItem('flowy-username', loginData.username);
                            console.log('Token 已保存，验证:', localStorage.getItem('flowy-token'));
                            setTimeout(() => {
                                window.location.href = 'index.html';
                            }, 100);
                        }
                    }, 1000);
                } else {
                    showError('register', result.error || '注册失败');
                }
            } catch (error) {
                showError('register', '网络错误，请稍后重试');
                console.error('注册错误:', error);
            } finally {
                btn.disabled = false;
                btn.textContent = '注册';
            }
        }

        // 检查是否已登录
        window.addEventListener('DOMContentLoaded', () => {
            const token = localStorage.getItem('flowy-token');
            if (token) {
                // 验证 token 是否有效
                fetch(getApiBase() + '/auth/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                })
                .then(res => res.json())
                .then(result => {
                    if (result.success) {
                        // 已登录，跳转到主页
                        window.location.href = 'index.html';
                    }
                });
            }
        });
    </script>
</body>
</html>
